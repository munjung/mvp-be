spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_DATABASE}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      max-lifetime: 1800000
      keepalive-time: 300000

logging:
  level:
    root: info
    com:
      ktds:
        mvp:
          demo: debug

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger

rule-engine:
  url: ${RULE_ENGINE_URL}