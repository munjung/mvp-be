spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_DATABASE}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2

logging:
  level:
    root: info
    com:
      ktds:
        mvp:
          demo: debug

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger