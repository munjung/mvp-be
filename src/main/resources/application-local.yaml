spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_DATABASE}?currentSchema=mvp
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: info
    com:
      ktds:
        mvp:
          demo: debug

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger

rule-engine:
  url: ${RULE_ENGINE_URL}