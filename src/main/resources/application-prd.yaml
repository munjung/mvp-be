spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_DATABASE}?currentSchema=mvp
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: debug

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger